<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FieldScope">
<meta name="theme-color" content="#0a140f">
<title>FieldScope</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap');
:root{
  --bg:#0a140f;--card:#13201a;--card2:#1a2a22;
  --border:rgba(92,184,92,.18);--border2:rgba(92,184,92,.35);
  --text:#e8f5e8;--muted:#7a9c7a;--faint:#2a3a2f;
  --accent:#5cb85c;--highlight:#a3e4a3;--lime:#a3e4a3;--green:#5cb85c;--amber:#f4b942;
  --red:#e06c6c;--blue:#4a9eff;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --card-radius:15px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;height:100dvh}

/* ── ANIMATIONS ── */
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{
  from{opacity:0;transform:translateY(8px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
@keyframes scanPulse{
  0%{border-color:rgba(92,184,92,.4);box-shadow:0 4px 20px rgba(0,0,0,.4)}
  50%{border-color:rgba(244,185,66,.7);box-shadow:0 4px 28px rgba(244,185,66,.18)}
  100%{border-color:rgba(92,184,92,.4);box-shadow:0 4px 20px rgba(0,0,0,.4)}
}
@keyframes rarePulse{
  0%,100%{background:rgba(224,108,108,.08)}
  50%{background:rgba(224,108,108,.15)}
}
@keyframes slideUp{
  from{opacity:0;transform:translateX(-50%) translateY(14px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ── HEADER ── */
.hdr{
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,20,15,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:8px}
.logo-text{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:#e8ffe8;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:7px}
.gps-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  background:rgba(92,184,92,.07);border:1px solid var(--border);
  font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:background .15s}
.gps-badge:active{background:rgba(92,184,92,.14)}
.gdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.gdot.ok{background:var(--accent);animation:glow 2s infinite}
.gdot.err{background:var(--red)}

/* ── TIMER BAR ── */
.timer-bar{
  display:none;align-items:center;justify-content:space-between;
  padding:5px 16px;background:rgba(10,20,15,.97);border-bottom:1px solid var(--border);flex-shrink:0;
}
.timer-bar.on{display:flex}
.t-left{display:flex;align-items:center;gap:10px}
.t-clock{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--accent);min-width:48px;
  font-variant-numeric:tabular-nums}
.t-phase{font-size:9.5px;font-weight:600;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.t-right{display:flex;align-items:center;gap:6px}
.log-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9px;
  background:rgba(92,184,92,.06);border:1px solid var(--border);
  font-size:9.5px;font-weight:700;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.4px;
  transition:background .15s}
.log-btn:active{background:rgba(92,184,92,.14)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0}
.ldot.warn{background:var(--amber)}
.ldot.err{background:var(--red);animation:glow .5s infinite}

/* ── LOG PANEL ── */
.log-panel{
  display:none;flex-direction:column;flex-shrink:0;
  max-height:190px;background:rgba(6,12,9,.99);border-bottom:1px solid var(--border);
}
.log-panel.on{display:flex}
.log-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.log-hdr-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.log-hdr-btns{display:flex;gap:6px}
.log-x{background:none;border:none;color:var(--faint);font-size:11px;cursor:pointer;padding:2px 5px;font-family:'Outfit',sans-serif;transition:color .13s}
.log-x:hover{color:var(--muted)}
.log-lines{flex:1;overflow-y:auto;padding:5px 14px 8px;font-family:'Courier New',monospace;font-size:10px;line-height:1.85}
.log-lines::-webkit-scrollbar{width:0}
.ll{display:flex;gap:6px}
.ll-ts{color:#1a2e1a;flex-shrink:0;font-size:9px;padding-top:1px}
.ll-info{color:#304830}
.ll-ok{color:var(--accent)}
.ll-warn{color:var(--amber)}
.ll-err{color:var(--red)}

/* ── SCAN BUTTON ── */
.scan-wrap{padding:11px 16px;flex-shrink:0}
.scan-btn{
  width:100%;padding:15px 20px;border-radius:14px;
  background:linear-gradient(135deg,#1c4a24,#2a6e36);
  border:1px solid rgba(92,184,92,.4);
  color:#d4ffd4;font-size:15px;font-weight:700;
  font-family:'Outfit',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .18s,opacity .18s;
  box-shadow:0 4px 20px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
}
.scan-btn:active{transform:scale(.975)}
.scan-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.scan-btn.scanning{animation:scanPulse 1.8s ease-in-out infinite}
.spinning{display:inline-block;animation:spin .75s linear infinite}

/* ── SCORE FORMULA ── */
.formula{display:flex;padding:0 16px 8px;flex-shrink:0;gap:0}
.fi{flex:1;display:flex;align-items:center;gap:4px;font-size:9px;font-weight:600;
  color:var(--faint);letter-spacing:.3px;text-transform:uppercase}
.fd{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px;gap:0}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:color .13s,border-color .13s;letter-spacing:.2px;
  display:flex;align-items:center;gap:4px}
.tab.on{color:var(--accent);border-color:var(--accent)}
.tab:active{opacity:.7}

/* ── LIST ── */
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 16px 90px}
.list::-webkit-scrollbar{width:0}

/* empty/status */
.state{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.state-icon{font-size:34px}
.state-title{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.state-sub{font-size:11px;color:var(--faint);max-width:240px;line-height:1.7;text-align:center}

/* progress */
.prog-box{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px;width:100%;max-width:300px}
.prog-lbl{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.9px;text-transform:uppercase;
  text-align:center;margin-bottom:12px}
.prog-track{height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--highlight));
  border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.prog-fill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 1.2s infinite}
.pstep{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:10.5px}
.ps-i{width:14px;text-align:center;flex-shrink:0;color:var(--muted)}
.ps-t{color:var(--faint);font-weight:500;transition:color .2s}
.ps-t.act{color:var(--amber);animation:glow .9s infinite}
.ps-t.done{color:var(--accent)}
.ps-t.fail{color:var(--red)}

/* ── SPOT CARDS ── */
.spot{
  background:var(--card);border:1px solid var(--border);border-radius:var(--card-radius);
  padding:13px 14px;margin-bottom:8px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  animation:rise .28s cubic-bezier(.34,1.3,.64,1) both;
}
.spot:active{background:var(--card2);transform:scale(.995)}
.spot.rare{border-color:rgba(224,108,108,.25);background:rgba(224,108,108,.035)}
.spot::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:var(--card-radius) 0 0 var(--card-radius);background:var(--accent);
  transition:background .2s}
.spot.rare::before{background:var(--red)}
.spot-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.spot-rank{font-size:9px;font-weight:700;color:var(--faint);letter-spacing:.6px;margin-bottom:2px;text-transform:uppercase}
.spot-rank.gold{color:var(--amber)}
.spot-name{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:#ecffec;line-height:1.2;padding-right:8px}

/* Score block with radial ring scaled to score */
.score-block{
  display:flex;flex-direction:column;align-items:center;flex-shrink:0;
  background:rgba(92,184,92,.08);border:1px solid rgba(92,184,92,.2);
  border-radius:10px;padding:5px 10px;min-width:52px;
  position:relative;
  box-shadow:0 0 0 2px rgba(92,184,92,.06),0 0 0 4px rgba(92,184,92,.03);
}
.score-block .n{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent);
  line-height:1;font-variant-numeric:tabular-nums}
.score-block .l{font-size:7.5px;font-weight:700;color:rgba(92,184,92,.5);letter-spacing:.8px;text-transform:uppercase}
.score-block.rare{background:rgba(224,108,108,.08);border-color:rgba(224,108,108,.22);
  box-shadow:0 0 0 2px rgba(224,108,108,.06),0 0 0 4px rgba(224,108,108,.03)}
.score-block.rare .n{color:var(--red)}

.meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.mtag{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  font-size:10.5px;font-weight:500;color:var(--muted)}
.mtag.hi{color:var(--text);border-color:var(--border2);background:rgba(92,184,92,.04)}
.mtag.rare-t{color:#ffaaaa;border-color:rgba(224,108,108,.22);background:rgba(224,108,108,.06)}

.bars{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.bar{display:flex;align-items:center;gap:7px}
.bar-l{font-size:8.5px;font-weight:700;color:var(--faint);width:40px;text-align:right;
  text-transform:uppercase;letter-spacing:.4px}
.bar-t{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.bar-f{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-f.p{background:var(--blue)}.bar-f.q{background:var(--accent)}.bar-f.r{background:var(--red)}
.bar-v{font-size:8.5px;color:var(--faint);width:26px;text-align:right;font-variant-numeric:tabular-nums}

.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.pill{font-size:10px;padding:2px 7px;border-radius:7px;border:1px solid var(--border);
  background:rgba(255,255,255,.025);color:var(--muted)}
.pill.r{background:rgba(224,108,108,.08);border-color:rgba(224,108,108,.2);color:#ffaaaa}
.pill.more{color:var(--faint);border-color:transparent;background:none}

.actions{display:flex;gap:6px;align-items:center}
.act{flex:1;padding:8px 6px;border-radius:9px;font-size:11px;font-weight:700;
  font-family:'Outfit',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:transform .12s,opacity .12s;border:none;letter-spacing:.1px}
.act.go{background:rgba(92,184,92,.12);border:1px solid rgba(92,184,92,.28);color:var(--accent)}
.act.map{background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.22);color:var(--blue)}
.act:active{transform:scale(.93);opacity:.85}

/* ── SAVED TAB ── */
.saved-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--card-radius);
  padding:13px 14px;margin-bottom:8px;position:relative;overflow:hidden;
  animation:rise .28s cubic-bezier(.34,1.3,.64,1) both;
}
.saved-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:var(--card-radius) 0 0 var(--card-radius);background:var(--amber)}
.save-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:8px;
  color:var(--faint);transition:color .15s,transform .12s;flex-shrink:0;
  display:flex;align-items:center;font-size:0}
.save-btn i{font-size:18px}
.save-btn.saved{color:var(--amber)}
.save-btn:active{transform:scale(.85)}
.visit-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:8px;
  color:var(--faint);transition:color .15s,transform .12s;flex-shrink:0;
  display:flex;align-items:center;font-size:0}
.visit-btn i{font-size:18px}
.visit-btn.visited{color:var(--accent)}
.visit-btn:active{transform:scale(.85)}
.spot.visited-spot{opacity:.5}
.spot.visited-spot .spot-rank::after{content:' ✓';color:var(--accent);font-size:8px}

/* expanding banner */
.expanding{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;
  background:rgba(244,185,66,.05);border:1px solid rgba(244,185,66,.16);
  margin-bottom:9px;font-size:11px;font-weight:600;color:var(--amber)}

/* ── MAP ── */
#mapView{flex:1;position:relative;display:none}
#mapView.on{display:block}
#mapEl{position:absolute;inset:0}
.leaflet-container{background:#0a140f !important;font-family:'Outfit',sans-serif}
.leaflet-tile-container{filter:brightness(0.82) contrast(1.1) saturate(0.75) hue-rotate(195deg)}
.leaflet-control-zoom a{background:var(--card) !important;color:var(--accent) !important;
  border-color:var(--border) !important;font-weight:700}
.leaflet-bar{border:1px solid var(--border) !important;box-shadow:0 2px 12px rgba(0,0,0,.6) !important;border-radius:10px !important;overflow:hidden}
.leaflet-control-attribution{background:rgba(6,12,9,.9) !important;color:var(--faint) !important;font-size:8px !important}
.leaflet-popup-content-wrapper{background:var(--card2) !important;border:1px solid var(--border2) !important;
  border-radius:13px !important;padding:0 !important;box-shadow:0 10px 30px rgba(0,0,0,.7) !important}
.leaflet-popup-content{margin:13px 15px !important;min-width:170px}
.leaflet-popup-tip{background:var(--card2) !important}
.leaflet-popup-close-button{color:var(--muted) !important;top:7px !important;right:9px !important;font-size:16px !important}
.p-name{font-family:'Fraunces',serif;font-size:13px;font-weight:700;color:#ecffec;margin-bottom:2px}
.p-score{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:5px;line-height:1}
.p-meta{font-size:10px;color:var(--muted);margin-bottom:9px;line-height:1.5}
.p-go{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;
  border-radius:8px;background:rgba(92,184,92,.1);border:1px solid var(--border2);
  color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;
  transition:background .13s}
.p-go:active{background:rgba(92,184,92,.2)}

.safe-pad{height:calc(12px + var(--safe-b));flex-shrink:0}

/* ── RARE BANNER ── */
.rare-banner{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;
  background:rgba(224,108,108,.08);
  border-bottom:1px solid rgba(224,108,108,.2);
  font-size:12px;font-weight:700;color:#ffaaaa;
  cursor:pointer;flex-shrink:0;
  animation:rarePulse 2.5s ease-in-out infinite;
}
.rare-banner:active{background:rgba(224,108,108,.16)}

/* ── HERO CARD ── */
.hero-card{
  background:linear-gradient(160deg,var(--card2) 70%,rgba(244,185,66,.04));
  border:1px solid var(--border2);
  border-radius:var(--card-radius);padding:13px 14px;margin-bottom:9px;
  cursor:pointer;
  border-top:2px solid rgba(244,185,66,.4);
  box-shadow:0 2px 16px rgba(0,0,0,.25);
}
.hero-card:active{opacity:.92;transform:scale(.998)}

/* ── DRIVE / RADIUS FILTER ── */
.df-bar{display:flex;gap:5px;padding:3px 0 10px;overflow-x:auto;scrollbar-width:none}
.df-bar::-webkit-scrollbar{display:none}
.df-btn{padding:5px 13px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:10.5px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;
  transition:background .13s,border-color .13s,color .13s,transform .1s;flex-shrink:0}
.df-btn:active{transform:scale(.92)}
.df-btn.on{background:rgba(92,184,92,.11);border-color:var(--border2);color:var(--accent)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(20px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(20,38,26,.97);border:1px solid rgba(92,184,92,.3);
  border-radius:20px;
  padding:8px 18px;font-size:12px;font-weight:600;color:var(--accent);
  opacity:0;transition:opacity .2s,transform .25s cubic-bezier(.34,1.4,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  backdrop-filter:blur(8px)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">
    <i class="ti ti-binoculars" style="font-size:24px;color:var(--accent)"></i>
    <div class="logo-text">FieldScope</div>
  </div>
  <div class="hdr-right">
    <div class="gps-badge" id="gpsBadge">
      <div class="gdot" id="gdot"></div>
      <span id="gTxt">GPS</span>
    </div>
  </div>
</div>

<!-- TIMER BAR -->
<div class="timer-bar" id="timerBar">
  <div class="t-left">
    <div class="t-clock" id="tClock">0:00</div>
    <div class="t-phase" id="tPhase">scanning</div>
  </div>
  <div class="t-right">
    <div class="log-btn" onclick="toggleLog()">
      <div class="ldot" id="ldot"></div>
      <span>Log</span>
    </div>
  </div>
</div>

<!-- LOG PANEL -->
<div class="log-panel" id="logPanel">
  <div class="log-hdr">
    <span class="log-hdr-title">🪵 Scan Log</span>
    <div class="log-hdr-btns">
      <button class="log-x" onclick="clearLog()">Clear</button>
      <button class="log-x" onclick="toggleLog()">✕</button>
    </div>
  </div>
  <div class="log-lines" id="logLines"></div>
</div>

<!-- SCAN -->
<div class="scan-wrap">
  <button class="scan-btn" id="scanBtn">
    <i id="scanIcon" class="ti ti-radar" style="font-size:22px"></i>
    <span id="scanTxt">Find Best Spots Near Me</span>
  </button>
</div>

<!-- SCORE FORMULA -->
<div class="formula">
  <div class="fi"><div class="fd" style="background:var(--blue)"></div>Proximity 40</div>
  <div class="fi"><div class="fd" style="background:var(--accent)"></div>Species 35</div>
  <div class="fi"><div class="fd" style="background:var(--red)"></div>Rarity 25</div>
  <div class="fi"><div class="fd" style="background:var(--amber)"></div>Recent +5</div>
</div>

<!-- TABS -->
<div class="tabs">

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const MAX_KM     = 200;
const WORKER_URL = 'https://polished-waterfall-c720.kevinducharme21.workers.dev';
const KPH        = 70; // avg drive speed — conservative for Quebec roads/Laurentians
let userLat  = 46.0156;
let userLng  = -73.4509;
let gpsReady = false;
let spots    = [];
let scanning = false;
let leafMap  = null;
let mapPins  = [];
let driveFilter  = 0;   // 0=all, 30=≤30min, 60=≤60min, 120=≤2hrs
let radiusFilter = 0;   // 0=all/200km, 30=≤30km, 100=≤100km
// Raw obs/notable from largest resolved phase — used for radius re-scoring
let rawObs = [], rawNotable = [], rawBack = 14, rawRadius = 0;
// Cached location — used to detect if user has moved since last scan
let cachedLat = null, cachedLng = null;

// ═══════════════════════════════════════
//  OFFLINE DETECTION
// ═══════════════════════════════════════
let isOnline = navigator.onLine;
window.addEventListener('online', ()=>{
  isOnline=true;
  // Remove offline banner if present
  const b=document.getElementById('offlineBanner');
  if(b)b.remove();
  toast('Back online',1500);
});
window.addEventListener('offline', ()=>{
  isOnline=false;
  toast('You\'re offline — showing cached data',3000);
  showOfflineBanner();
});

function showOfflineBanner(){
  if(document.getElementById('offlineBanner'))return;
  const b=document.createElement('div');
  b.id='offlineBanner';
  b.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 16px;'
    +'background:rgba(224,108,108,.1);border-bottom:1px solid rgba(224,108,108,.25);'
    +'font-size:11px;font-weight:600;color:#ffaaaa;flex-shrink:0;';
  b.innerHTML='<i class="ti ti-wifi-off"></i> Offline — results from last scan';
  const listEl=document.getElementById('listView');
  listEl.parentNode.insertBefore(b,listEl);
}

// ═══════════════════════════════════════
//  LOGGING
// ═══════════════════════════════════════
let logOpen = false, logHasErr = false;
function log(type, msg) {
  const ts = new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const lines = document.getElementById('logLines');
  if (lines) {
    const row = document.createElement('div');
    row.className = 'll';
    row.innerHTML = '<span class="ll-ts">'+ts+'</span><span class="ll-'+type+'">'+msg+'</span>';
    lines.appendChild(row);
    lines.scrollTop = lines.scrollHeight;
  }
  if (type==='err') { logHasErr=true; setLdot('err'); document.getElementById('logPanel').classList.add('on'); logOpen=true; }
  else if (type==='warn'&&!logHasErr) setLdot('warn');
  console[type==='err'?'error':type==='warn'?'warn':'log']('['+type+'] '+msg);
}
function setLdot(s){const d=document.getElementById('ldot');if(d)d.className='ldot '+s;}
function toggleLog(){logOpen=!logOpen;document.getElementById('logPanel').classList.toggle('on',logOpen);}
function clearLog(){const el=document.getElementById('logLines');if(el)el.innerHTML='';logHasErr=false;setLdot('');}

// ═══════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════
let timerRef=null, timerT0=0;
function startTimer(phase){
  timerT0=Date.now();
  document.getElementById('timerBar').classList.add('on');
  document.getElementById('tPhase').textContent=phase;
  clearInterval(timerRef);
  timerRef=setInterval(()=>{
    const s=(Date.now()-timerT0)/1000;
    const min=Math.floor(s/60), sec=Math.floor(s%60);
    document.getElementById('tClock').textContent=min+':'+(sec<10?'0':'')+sec;
  },200);
}
function setPhase(p){document.getElementById('tPhase').textContent=p;}
function stopTimer(){
  clearInterval(timerRef); timerRef=null;
  const s=((Date.now()-timerT0)/1000).toFixed(1);
  setPhase('done · '+s+'s');
  log('ok','⏱ Total: '+s+'s');
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function km(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dG=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function driveMin(d){return Math.round(d/KPH*60);}
function driveTxt(d){const m=driveMin(d);return m<60?'~'+m+' min':'~'+Math.floor(m/60)+'h'+(m%60?m%60+'m':'');}
function toast(msg,dur){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),dur||2500);}

// ═══════════════════════════════════════
//  GPS
// ═══════════════════════════════════════
function initGPS(){
  if(!navigator.geolocation){setGPS(false,'No GPS');return;}
  setGPS(null,'Locating…');
  navigator.geolocation.getCurrentPosition(
    p=>{
      userLat=p.coords.latitude;userLng=p.coords.longitude;gpsReady=true;
      setGPS(true,userLat.toFixed(3)+', '+userLng.toFixed(3));
      log('ok','GPS: '+userLat.toFixed(5)+', '+userLng.toFixed(5));
      if(leafMap)leafMap.setView([userLat,userLng]);
      // Stale location check (Step 11):
      // If cache was loaded from a different location (>15km away),
      // warn the user and auto-trigger a fresh scan.
      if(cachedLat!==null){
        const d=km(userLat,userLng,cachedLat,cachedLng);
        if(d>15&&!scanning){
          log('warn','Location changed '+Math.round(d)+'km from cached — auto-rescanning');
          showStaleLocationBanner();
          setTimeout(()=>scan(),800); // brief delay so user sees the banner
        }
      }
    },
    e=>{setGPS(false,'GPS off · using Joliette');log('warn','GPS error: '+e.message);},
    {enableHighAccuracy:true,timeout:8000}
  );
}
function setGPS(ok,txt){
  document.getElementById('gdot').className='gdot'+(ok===true?' ok':ok===false?' err':'');
  document.getElementById('gTxt').textContent=txt;
}

// ═══════════════════════════════════════
//  FETCH eBIRD — Cloudflare Worker
//  Worker now tiles multiple 50km calls
//  to cover 100km and 200km ranges
// ═══════════════════════════════════════
const FETCH_TIMEOUT_MS = 30000; // 30s hard timeout per phase

function fetchWithTimeout(url, timeoutMs){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  return fetch(url, {signal: ctrl.signal}).finally(()=>clearTimeout(timer));
}

async function ebirdFetch(radiusKm, backDays){
  const back = backDays || 7;
  const t0=Date.now();
  const params='lat='+userLat+'&lng='+userLng+'&dist='+radiusKm+'&back='+back;
  log('info','Fetching eBird '+radiusKm+'km · '+back+' days...');
  let obsRes, notRes;
  try {
    [obsRes,notRes]=await Promise.all([
      fetchWithTimeout(WORKER_URL+'/obs?'+params, FETCH_TIMEOUT_MS),
      fetchWithTimeout(WORKER_URL+'/notable?'+params, FETCH_TIMEOUT_MS)
    ]);
  } catch(netErr) {
    const isTimeout = netErr.name==='AbortError';
    const msg = isTimeout
      ? 'Worker timeout after 30s — check Cloudflare dashboard'
      : 'Network error: '+netErr.message+' (CORS or Worker offline?)';
    log('err', msg);
    throw new Error(isTimeout ? 'Request timed out (30s). Worker may be sleeping.' : 'Cannot reach Worker. Check connection or CORS.');
  }
  const elapsed=((Date.now()-t0)/1000).toFixed(1);
  const tiles=obsRes.headers.get('X-Tiles')||'1';
  const cacheObs=obsRes.headers.get('X-Cache')||'?';
  const cacheNot=notRes.headers.get('X-Cache')||'?';
  log('info','HTTP '+obsRes.status+'/'+notRes.status+' · '+elapsed+'s · '+obsRes.headers.get('X-eBird-Records')+' rec · '+tiles+' tiles · cache '+cacheObs+'/'+cacheNot);
  if(!obsRes.ok){
    let body='';
    try{body=await obsRes.text();}catch(_){}
    const isHtml=body.trim().startsWith('<');
    const detail=isHtml?'Worker returned HTML (crash/cold-start error)':body.slice(0,150);
    log('err','OBS HTTP '+obsRes.status+': '+detail);
    throw new Error('Worker error '+obsRes.status+(isHtml?' — may be a cold-start crash, try again':': '+detail));
  }
  const obs=await obsRes.json();
  const notable=notRes.ok?await notRes.json():[];
  if(!notRes.ok)log('warn','Notable HTTP '+notRes.status+' — no rare birds this scan');
  if(!Array.isArray(obs)){log('err','OBS not array: '+JSON.stringify(obs).slice(0,100));throw new Error('OBS response not an array');}
  log('ok','✓ '+obs.length+' obs + '+notable.length+' notable in '+elapsed+'s');
  return {obs,notable};
}

// ═══════════════════════════════════════
//  COMMON SPECIES SET (Step 6)
//  Species that appear on almost every Quebec/NE checklist regardless
//  of habitat quality. Count as 0.5 toward species diversity score
//  instead of 1.0 — still valued, just discounted.
//  Tuned for Quebec / Laurentians / St. Lawrence region.
// ═══════════════════════════════════════
const COMMON_SP=new Set([
  'American Crow','American Robin','Black-capped Chickadee',
  'Blue Jay','Canada Goose','Common Grackle','Common Raven',
  'Dark-eyed Junco','European Starling','House Finch',
  'House Sparrow','Mallard','Mourning Dove','Northern Cardinal',
  'Red-winged Blackbird','Rock Pigeon','Song Sparrow',
  'White-breasted Nuthatch','White-throated Sparrow',
  'Downy Woodpecker','Hairy Woodpecker','American Goldfinch',
  'Cedar Waxwing','Tree Swallow','Common Yellowthroat',
]);


function p90(values){
  // Returns the 90th-percentile value from an array of numbers
  if(!values.length)return 60;
  const sorted=[...values].sort((a,b)=>a-b);
  const idx=Math.floor(sorted.length*0.9);
  return sorted[Math.min(idx,sorted.length-1)];
}

function processAndScore(obs,notable,maxKm,backDays){
  const lim=maxKm||MAX_KM;
  const back=backDays||7;
  const now=Date.now();
  const H24=24*3600000;
  const H48=48*3600000;
  const H7 =7 *24*3600000;
  const H14=14*24*3600000;
  const H30=30*24*3600000;
  const map=new Map();
  function add(item,isRare){
    if(!item?.lat||!item?.lng||!item?.locId)return;
    const d=km(userLat,userLng,item.lat,item.lng);
    if(d>lim)return;
    if(!map.has(item.locId))map.set(item.locId,{
      id:item.locId,name:item.locName||item.locId,
      lat:item.lat,lng:item.lng,dist:Math.round(d*10)/10,
      species:new Set(),rare:new Set(),recent:[],
      checklists:new Map(), // subId → timestamp (ms), for both Step 3 and Step 4
    });
    const loc=map.get(item.locId);
    if(item.comName){loc.species.add(item.comName);if(isRare)loc.rare.add(item.comName);loc.recent.push(item.comName);}
    // Track checklist timestamp — Map keyed by subId, value = parsed obsDt ms
    // If same subId seen again, keep the latest timestamp (shouldn't differ but defensive)
    if(item.subId&&item.obsDt){
      const t=new Date(item.obsDt.replace(' ','T')).getTime();
      if(!isNaN(t)){
        const prev=loc.checklists.get(item.subId)||0;
        if(t>prev)loc.checklists.set(item.subId,t);
      }
    } else if(item.subId){
      // subId present but no obsDt — still count the checklist, timestamp 0
      if(!loc.checklists.has(item.subId))loc.checklists.set(item.subId,0);
    }
  }
  (Array.isArray(obs)?obs:[]).forEach(o=>add(o,false));
  (Array.isArray(notable)?notable:[]).forEach(n=>add(n,true));

  // Dynamic species normalization ceiling:
  // Use 90th-percentile species count across all found locations.
  // This means the top 10% of hotspots score near 35/35 regardless of
  // whether we're in a 30km suburban scan or a 200km provincial scan.
  // Floor at 15 so sparse scans don't produce a ceiling so low that
  // every mediocre spot maxes out species score.
  const allLocs=Array.from(map.values());
  const spCounts=allLocs.map(l=>l.species.size);
  const spNorm=Math.max(15, p90(spCounts));
  log('info','Species norm ceiling: '+spNorm+' (p90 of '+allLocs.length+' locations, was 60)');

  // Drive-time proximity ceiling:
  // Convert the radius limit to minutes at KPH, use that as the sP denominator.
  const driveMaxMin=driveMin(lim);
  log('info','Proximity ceiling: '+driveMaxMin+' min drive ('+lim+'km @ '+KPH+'kph)');

  return allLocs.map(loc=>{
    const spCnt=loc.species.size,rareCnt=loc.rare.size;
    const totalChecklists=Math.max(1,loc.checklists.size);

    // sP: drive-time based — closer in minutes = higher score
    const locDriveMin=driveMin(loc.dist);
    const sP=Math.round(Math.max(0,(1-locDriveMin/driveMaxMin)*40));

    // sQ: species diversity with common-species discount (Step 6)
    // Each common species counts as 0.5 instead of 1.0.
    // A spot with 20 common + 20 quality species scores as 30 effective,
    // not 40. Still valued, just not equal to quality species.
    const effSpCnt=[...loc.species].reduce((acc,sp)=>acc+(COMMON_SP.has(sp)?0.5:1.0),0);
    const sQ=Math.round(Math.min(35,(effSpCnt/spNorm)*35));

    const concentration=Math.min(1, 10/totalChecklists);
    const rareMult=0.7+(concentration*0.3);
    const sR=Math.round(Math.min(25, rareCnt*8*rareMult));

    // sRec: volume-weighted recency (Step 4)
    // Count distinct checklists submitted within 24h and 24–48h windows.
    const timestamps=[...loc.checklists.values()];
    const latestTs=timestamps.length>0?Math.max(...timestamps):0;
    const ageH=latestTs>0?(now-latestTs)/3600000:999;
    const recent24=timestamps.filter(t=>t>0&&(now-t)<=H24).length;
    const recent48=timestamps.filter(t=>t>0&&(now-t)>H24&&(now-t)<=H48).length;
    const raw24=Math.min(5, recent24);
    const raw48=Math.min(3, recent48*0.5);
    const sRec=Math.min(5, Math.round(raw24>0?raw24:raw48));

    // sMom: momentum score (Step 5) — is this spot heating up or cooling down?
    // Compares last 7 days of checklist activity against the prior period.
    // Only meaningful when backDays >= 14. For 7-day fetches, sMom = 0.
    //
    // Windows (using checklist timestamps):
    //   w1 = checklists in last 7 days          (most recent week)
    //   w2 = checklists in days 7–14            (previous week)
    //   w3 = checklists in days 14–30 / 2       (2-week baseline, halved to weekly rate)
    //
    // trend = w1 − avg(w2, w3)  → positive = heating up, negative = cooling down
    // Normalized to ±5 using a soft sigmoid-style clamp.
    // If back < 14, we don't have enough history → sMom = 0, label = ''.
    let sMom=0, momentumLabel='';
    if(back>=14){
      const w1=timestamps.filter(t=>t>0&&(now-t)<=H7).length;
      const w2=timestamps.filter(t=>t>0&&(now-t)>H7&&(now-t)<=H14).length;
      const w3=back>=30
        ? timestamps.filter(t=>t>0&&(now-t)>H14&&(now-t)<=H30).length/2
        : 0; // no 14–30 data if back=14
      const baseline=back>=30?(w2+w3)/2:w2;
      const trend=w1-baseline;
      // Normalize: each checklist of delta = ~1pt, capped at ±5
      // Use sign-preserving sqrt to compress large deltas gracefully
      const raw=trend===0?0:Math.sign(trend)*Math.min(5,Math.sqrt(Math.abs(trend)*2.5));
      sMom=Math.round(raw);
      if(sMom>=2)momentumLabel='▲ Heating up';
      else if(sMom===1)momentumLabel='↑ Picking up';
      else if(sMom<=-2)momentumLabel='▼ Slowing down';
      else if(sMom===-1)momentumLabel='↓ Quieting';
    }

    const seen=new Set(),top=[];
    for(const n of loc.recent){if(!seen.has(n)){seen.add(n);top.push(n);}if(top.length>=6)break;}

    return {id:loc.id,name:loc.name,lat:loc.lat,lng:loc.lng,dist:loc.dist,driveMin:locDriveMin,
      score:sP+sQ+sR+sRec+sMom,sP,sQ,sR,sRec,sMom,momentumLabel,ageH:Math.round(ageH),
      recent24,recent48,
      spCnt,effSpCnt:Math.round(effSpCnt*10)/10,rareCnt,totalChecklists,spNorm,concentration:Math.round(concentration*100),
      rare:[...loc.rare],topSp:top};
  }).sort((a,b)=>b.score-a.score);
}

// ═══════════════════════════════════════
//  MAIN SCAN — parallel phases 30 / 100 / 200km
//  All three fetches fire simultaneously.
//  Results render as each phase lands — fastest first.
//  Total wall-clock time ≈ slowest single phase, not sum of all three.
// ═══════════════════════════════════════
const SCAN_WATCHDOG_MS = 120000; // 2min hard reset
let watchdogRef = null;

function resetScanState(){
  scanning=false;
  if(watchdogRef){clearTimeout(watchdogRef);watchdogRef=null;}
  const btn=document.getElementById('scanBtn');
  if(btn){btn.disabled=false;btn.classList.remove('scanning');}
  const icon=document.getElementById('scanIcon');
  if(icon){icon.className='ti ti-radar';icon.style.fontSize='22px';}
  const txt=document.getElementById('scanTxt');
  if(txt)txt.textContent='Scan Again';
}

async function scan(){
  // Offline guard — don't attempt fetch, show cached data if available
  if(!isOnline){
    toast('You\'re offline — showing last cached scan',3000);
    if(!spots.length){
      document.getElementById('listView').innerHTML=`
        <div class="state">
          <i class="ti ti-wifi-off" style="font-size:42px;color:var(--red)"></i>
          <div class="state-title">Offline</div>
          <div class="state-sub">No cached data yet. Connect to the internet and scan once to enable offline mode.</div>
        </div>`;
    }
    showOfflineBanner();
    return;
  }
  if(scanning){
    log('warn','Scan already running — tap again to force-reset');
    resetScanState();
    stopTimer();
    return;
  }
  scanning=true;
  clearLog(); logHasErr=false;
  radiusFilter=0; rawObs=[]; rawNotable=[]; rawBack=14; rawRadius=0;

  // Watchdog: auto-recover if scan hangs for 2min
  watchdogRef=setTimeout(()=>{
    log('err','Watchdog fired — scan hung for 2min, resetting');
    toast('Scan timed out — tap to try again',4000);
    resetScanState();
    stopTimer();
  }, SCAN_WATCHDOG_MS);

  const btn=document.getElementById('scanBtn');
  const icon=document.getElementById('scanIcon');
  const txt=document.getElementById('scanTxt');
  btn.disabled=true; btn.classList.add('scanning');
  icon.className='ti ti-loader spinning'; icon.style.fontSize='22px'; txt.textContent='Scanning…';
  startTimer('all phases · parallel');
  showLoading();
  log('info','Scan — GPS: '+userLat.toFixed(4)+', '+userLng.toFixed(4));
  log('info','Firing all 3 phases simultaneously…');

  // Track best dataset resolved so far
  // Phase 3 (200km) supersedes Phase 2 (100km) supersedes Phase 1 (30km)
  let bestRadius=0;
  let settledCount=0;
  const totalPhases=3;

  // Helper: update list with best available data, mark expanding if not all done
  function renderBest(expanding){
    if(spots.length)renderList(expanding);
    updateMap();
  }

  try {

    const t0=Date.now();

    // Fire all three fetches in parallel — do NOT await here
    const p1=ebirdFetch(30,  30).then(({obs,notable})=>{
      const t=((Date.now()-t0)/1000).toFixed(1);
      log('ok','Phase 1 (30km): '+obs.length+' obs · '+notable.length+' notable in '+t+'s');
      setStep('s1','done','✓ 30km in '+t+'s');
      setBar(30);
      if(bestRadius<30){
        bestRadius=30;
        rawObs=obs; rawNotable=notable; rawBack=30; rawRadius=30;
        spots=processAndScore(obs,notable,30,30);
        settledCount++;
        renderBest(settledCount<totalPhases);
        toast('✓ '+spots.length+' nearby spots found',2000);
        cache();
      }
    }).catch(err=>{
      log('err','Phase 1 failed: '+err.message);
      setStep('s1','fail','✗ 30km failed');
      settledCount++;
      // If nothing resolved yet, show error state
      if(bestRadius===0&&settledCount===totalPhases){
        document.getElementById('listView').innerHTML=''
          +'<div class="state"><i class="ti ti-alert-triangle" style="font-size:42px;color:var(--amber)"></i>'
          +'<div class="state-title">Scan Failed</div>'
          +'<div class="state-sub" style="color:var(--red)">'+err.message+'</div>'
          +'<div style="display:flex;gap:8px;margin-top:12px">'
          +'<button class="retry-btn" style="padding:8px 14px;background:rgba(80,160,60,.13);border:1px solid var(--border2);border-radius:8px;color:var(--lime);font-size:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">↩ Retry</button>'
          +'<button onclick="toggleLog()" style="padding:8px 14px;background:rgba(80,160,60,.07);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">🪵 Log</button>'
          +'</div></div>';
      }
    });

    const p2=ebirdFetch(100, 14).then(({obs,notable})=>{
      const t=((Date.now()-t0)/1000).toFixed(1);
      log('ok','Phase 2 (100km): '+obs.length+' obs · '+notable.length+' notable in '+t+'s');
      setStep('s2','done','✓ 100km in '+t+'s');
      setBar(60);
      if(bestRadius<100){
        bestRadius=100;
        rawObs=obs; rawNotable=notable; rawBack=14; rawRadius=100;
        spots=processAndScore(obs,notable,100,14);
        settledCount++;
        renderBest(settledCount<totalPhases);
        toast('✓ '+spots.length+' spots within 100km',2000);
        cache();
      } else {
        settledCount++;
      }
    }).catch(err=>{
      log('warn','Phase 2 failed: '+err.message);
      setStep('s2','fail','✗ 100km failed');
      settledCount++;
    });

    const p3=ebirdFetch(200, 14).then(({obs,notable})=>{
      const t=((Date.now()-t0)/1000).toFixed(1);
      log('ok','Phase 3 (200km): '+obs.length+' obs · '+notable.length+' notable in '+t+'s');
      setStep('s3','done','✓ 200km in '+t+'s');
      setBar(100);
      if(bestRadius<200){
        bestRadius=200;
        rawObs=obs; rawNotable=notable; rawBack=14; rawRadius=200;
        spots=processAndScore(obs,notable,200,14);
        settledCount++;
        renderBest(false); // final render — not expanding
        toast('✓ Full scan — '+spots.length+' spots within 200km');
        cache();
      } else {
        settledCount++;
        renderBest(false);
      }
    }).catch(err=>{
      log('err','Phase 3 failed: '+err.message);
      setStep('s3','fail','✗ 200km failed — showing best available');
      toast('200km failed — showing best available',3000);
      settledCount++;
      renderBest(false);
    });

    // Mark phases as active immediately
    setStep('s1','act','Fetching 30km · 30 days…');
    setStep('s2','act','Fetching 100km · 14 days…');
    setStep('s3','act','Fetching 200km · 14 days…');

    // Wait for all three to settle (fulfilled or rejected)
    await Promise.allSettled([p1, p2, p3]);

    // Final render pass to ensure UI is in sync
    if(spots.length) renderList(false);

  } finally {
    done();
  }
}

function done(){
  stopTimer();
  resetScanState();
  // Dismiss stale location banner if scan succeeded
  const banner=document.getElementById('staleBanner');
  if(banner)banner.remove();
}
function cache(){try{localStorage.setItem('fs_cache',JSON.stringify({ts:Date.now(),spots,lat:userLat,lng:userLng}));}catch(_){}}

// ═══════════════════════════════════════
//  STARTUP + EVENT WIRING
//  Single DOMContentLoaded — all DOM-ready logic here
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{

  // ── Button wiring (CSP-safe, no inline onclick) ──
  document.getElementById('scanBtn').addEventListener('click', scan);

  // Drive filter + radius filter + retry + save + visit button delegation on listView
  document.getElementById('listView').addEventListener('click',function(e){
    const dfBtn=e.target.closest('.df-btn');
    if(dfBtn){setDriveFilter(parseInt(dfBtn.dataset.df));return;}
    const rfBtn=e.target.closest('.rf-btn');
    if(rfBtn){setRadiusFilter(parseInt(rfBtn.dataset.rf));return;}
    const retryBtn=e.target.closest('.retry-btn');
    if(retryBtn){scan();return;}
    const saveBtn=e.target.closest('.save-btn');
    if(saveBtn){toggleSave(saveBtn.dataset.id);return;}
    const visitBtn=e.target.closest('.visit-btn');
    if(visitBtn){toggleVisited(visitBtn.dataset.id);return;}
    const hvBtn=e.target.closest('.hv-btn');
    if(hvBtn){toggleHideVisited();return;}
  });

  // Save/unsave delegation on savedView (trash icon)
  document.getElementById('savedView').addEventListener('click',function(e){
    const saveBtn=e.target.closest('.save-btn');
    if(saveBtn){toggleSave(saveBtn.dataset.id);return;}
  });

  // ── GPS ──
  initGPS();

  // ── Load saved and visited spots from localStorage ──
  loadSaved();
  loadVisited();

  // ── Pause timer when app backgrounded ──
  let timerPausedAt = 0;
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      if(timerRef){clearInterval(timerRef);timerRef=null;timerPausedAt=Date.now();}
    } else {
      if(scanning && timerPausedAt){
        timerT0 += Date.now()-timerPausedAt;
        timerPausedAt=0;
        timerRef=setInterval(()=>{
          const s=(Date.now()-timerT0)/1000;
          const min=Math.floor(s/60), sec=Math.floor(s%60);
          document.getElementById('tClock').textContent=min+':'+(sec<10?'0':'')+sec;
        },200);
      }
    }
  });

  // ── Cache restore ──
  try{
    const c=JSON.parse(localStorage.getItem('fs_cache')||'null');
    if(c&&Date.now()-c.ts<3600000&&c.spots&&c.spots.length){
      spots=c.spots;
      if(c.lat){
        cachedLat=c.lat; cachedLng=c.lng;
        userLat=c.lat; userLng=c.lng;
      }
      renderList(false);
      const age=Math.round((Date.now()-c.ts)/60000);
      document.getElementById('scanTxt').textContent='Scan Again ('+age+'min ago)';
      if(!isOnline){
        showOfflineBanner();
        toast('Offline — showing cached scan from '+age+'min ago',4000);
      } else {
        const topRare=spots.find(s=>s.rareCnt>0);
        if(topRare)toast('Rare: '+topRare.rare[0]+' · '+topRare.dist+'km away',4000);
        else toast(spots.length+' spots from cache · '+age+'min old');
      }
    } else if(!isOnline){
      // Offline with no usable cache
      document.getElementById('listView').innerHTML=`
        <div class="state">
          <i class="ti ti-wifi-off" style="font-size:42px;color:var(--red)"></i>
          <div class="state-title">Offline</div>
          <div class="state-sub">No cached data yet. Connect to the internet and scan once to enable offline mode.</div>
        </div>`;
      showOfflineBanner();
    }
  }catch(_){}

});

function setDriveFilter(mins){
  driveFilter=mins;

  renderList(false);
}

// ═══════════════════════════════════════
//  RADIUS FILTER
//  Re-scores from raw obs using selected radius.
//  Proximity scores recalibrate against the tighter radius,
//  so nearby spots rank higher when you pick 30km.
// ═══════════════════════════════════════
function setRadiusFilter(km){
  if(!rawObs.length){toast('Scan first to use radius filter',2000);return;}
  radiusFilter=km;
  document.querySelectorAll('.rf-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.rf)===km));
  const lim=km||rawRadius||200;
  const bk=km===30?30:rawBack; // use 30-day back for 30km re-score if available
  spots=processAndScore(rawObs,rawNotable,lim,bk);
  renderList(false);
  updateMap();
  log('info','Radius filter: '+lim+'km → '+spots.length+' spots');
}

//  MAP
// ═══════════════════════════════════════
function initMap(){
  if(leafMap)return;
  leafMap=L.map('mapEl',{center:[userLat,userLng],zoom:9});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19,
    attribution:'© <a href="https://carto.com/">CARTO</a> · © <a href="https://osm.org/copyright">OSM</a>'
  }).addTo(leafMap);
  setTimeout(()=>leafMap.invalidateSize(),80);
  if(spots.length)updateMap();
}
function updateMap(){
  if(!leafMap)return;
  mapPins.forEach(m=>m.remove()); mapPins=[];

  // Score-scaled pins (Step 10)
  // radius = 6 + (score/maxScore) × 10  → range 6–16px
  // Rare spots get +2 bonus so they stand out regardless of score.
  // Color: red=rare, amber=#1, green=others
  const maxScore=spots.length>0?spots[0].score:100;

  // User location marker — small white pulse so you can orient on the map
  const userPin=L.circleMarker([userLat,userLng],{
    radius:5,fillColor:'#ffffff',color:'rgba(255,255,255,.5)',
    weight:6,fillOpacity:1,className:'user-pin'
  });
  userPin.bindPopup('<div class="p-name">Your Location</div>');
  userPin.addTo(leafMap); mapPins.push(userPin);

  spots.forEach((s,i)=>{
    const isR=s.rareCnt>0;
    const col=isR?'#e06c6c':i===0?'#f4b942':'#5cb85c';
    const baseRad=6+Math.round((s.score/maxScore)*10);
    const rad=isR?Math.min(16,baseRad+2):baseRad;
    const opacity=i===0?0.95:Math.max(0.65,0.9-(i*0.01)); // top spots more opaque
    const m=L.circleMarker([s.lat,s.lng],{
      radius:rad,fillColor:col,
      color:'rgba(255,255,255,.4)',weight:i===0?2:1.5,
      fillOpacity:opacity
    });
    m.bindPopup(`
      <div class="p-name">${s.name}</div>
      <div class="p-score">${s.score}<span style="font-size:11px;color:var(--muted);font-family:Outfit"> / 100</span></div>
      <div class="p-meta">
        <i class="ti ti-location"></i> ${s.dist}km ·
        <i class="ti ti-car"></i> ${driveTxt(s.dist)} ·
        <i class="ti ti-bird"></i> ${s.spCnt} sp.
        ${isR?`· <i class="ti ti-zap"></i> ${s.rareCnt} rare`:''}
      </div>
      <button class="p-go" onclick="navTo(${s.lat},${s.lng})"><i class="ti ti-navigation"></i> Get Directions</button>
    `);
    m.addTo(leafMap); mapPins.push(m);
  });
}
function flyTo(lat,lng){showTab('map');setTimeout(()=>{if(leafMap)leafMap.flyTo([lat,lng],13,{duration:.9});},55);}
function navTo(lat,lng){
  var isAndroid=/Android/i.test(navigator.userAgent);
  var url=isAndroid
    ? 'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode=driving'
    : 'https://maps.apple.com/?daddr='+lat+','+lng+'&dirflg=d';
  window.open(url,'_blank');
}

function showStaleLocationBanner(){
  // Inject amber warning above the list — tapping it triggers a fresh scan
  const existing=document.getElementById('staleBanner');

  banner.id='staleBanner';
  banner.style.cssText='display:flex;align-items:center;gap:8px;padding:9px 16px;'
    +'background:rgba(244,185,66,.1);border-bottom:1px solid rgba(244,185,66,.3);'
    +'font-size:12px;font-weight:600;color:var(--amber);cursor:pointer;flex-shrink:0;';

    +'<span style="margin-left:auto;font-size:10px;color:rgba(244,185,66,.6)">tap to dismiss</span>';

//  Persisted to localStorage as fs_saved.
//  Keyed by locId — saving same spot updates it.
// ═══════════════════════════════════════
let savedSpots = {}; // locId → {id,name,lat,lng,dist,score,rare,spCnt,savedAt}
let visitedSpots = {}; // locId → {id,name,visitedAt}
let hideVisited = false; // filter toggle

function loadSaved(){
  try{savedSpots=JSON.parse(localStorage.getItem('fs_saved')||'{}');}catch(_){savedSpots={};}
}
function persistSaved(){
  try{localStorage.setItem('fs_saved',JSON.stringify(savedSpots));}catch(_){}
}
function isSaved(id){return !!savedSpots[id];}

function saveSpot(s){
  savedSpots[s.id]={
    id:s.id,name:s.name,lat:s.lat,lng:s.lng,
    dist:s.dist,score:s.score,rareCnt:s.rareCnt,
    rare:s.rare,spCnt:s.spCnt,savedAt:Date.now()
  };
  persistSaved();
  toast('★ '+s.name+' saved',1800);
  // Refresh star states in current list without full re-render
  document.querySelectorAll('.save-btn[data-id="'+s.id+'"]').forEach(b=>{
    b.classList.add('saved');
    b.title='Unsave';
  });
}

function unsaveSpot(id){
  const name=(savedSpots[id]||{}).name||'Spot';
  delete savedSpots[id];
  persistSaved();
  toast('Removed: '+name,1800);
  document.querySelectorAll('.save-btn[data-id="'+id+'"]').forEach(b=>{
    b.classList.remove('saved');
    b.title='Save';
  });
  // If saved tab is open, re-render it
  if(document.getElementById('tabSaved').classList.contains('on'))renderSaved();
}

function toggleSave(id){
  const spot=spots.find(s=>s.id===id);
  if(!spot){
    // Might be toggling from saved tab — only unsave makes sense there
    if(isSaved(id))unsaveSpot(id);
    return;
  }
  isSaved(id)?unsaveSpot(id):saveSpot(spot);
}

function renderSaved(){
  const sv=document.getElementById('savedView');
  const entries=Object.values(savedSpots).sort((a,b)=>b.savedAt-a.savedAt);
  if(!entries.length){
    sv.innerHTML=`<div class="state">
      <i class="ti ti-star" style="font-size:42px;color:var(--amber)"></i>
      <div class="state-title">No saved spots yet</div>
      <div class="state-sub">Tap the star on any spot card to save it for quick access.</div>
    </div>`;
    return;
  }
  const cards=entries.map((s,i)=>{
    const age=Math.round((Date.now()-s.savedAt)/60000);
    const ageTxt=age<60?age+'min ago':age<1440?Math.floor(age/60)+'h ago':Math.floor(age/1440)+'d ago';
    const rareTags=s.rare&&s.rare.length
      ? s.rare.slice(0,2).map(n=>`<span class="pill r"><i class="ti ti-zap"></i> ${n}</span>`).join('')
      : '';
    return `<div class="saved-card" style="animation-delay:${Math.min(i*28,300)}ms">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
        <div style="flex:1;padding-right:8px">
          <div class="spot-name">${s.name}</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">
            <div class="mtag hi"><i class="ti ti-location"></i> ${s.dist}km</div>
            <div class="mtag hi"><i class="ti ti-car"></i> ${driveTxt(s.dist)}</div>
            <div class="mtag"><i class="ti ti-bird"></i> ${s.spCnt} sp.</div>
            ${s.rareCnt>0?`<div class="mtag rare-t"><i class="ti ti-zap"></i> ${s.rareCnt} rare</div>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="score-block${s.rareCnt>0?' rare':''}"><div class="n">${s.score}</div><div class="l">Score</div></div>
          <button class="save-btn saved" data-id="${s.id}" title="Unsave" style="font-size:13px;color:var(--faint)"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      ${rareTags?`<div class="pills" style="margin-bottom:8px">${rareTags}</div>`:''}
      <div style="font-size:9.5px;color:var(--faint);margin-bottom:8px"><i class="ti ti-clock"></i> Saved ${ageTxt}</div>
      <div class="actions">
        <button class="act go" onclick="navTo(${s.lat},${s.lng})"><i class="ti ti-navigation"></i> Directions</button>
        <button class="act map" onclick="flyTo(${s.lat},${s.lng})"><i class="ti ti-map"></i> Map</button>
      </div>
    </div>`;
  }).join('');

  sv.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 10px">
    <div style="font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:.8px;text-transform:uppercase">${entries.length} saved spot${entries.length>1?'s':''}</div>
    <button onclick="clearAllSaved()" style="font-size:10px;color:var(--faint);background:none;border:none;cursor:pointer;font-family:Outfit,sans-serif">Clear all</button>
  </div>${cards}`;
}

function clearAllSaved(){
  if(!Object.keys(savedSpots).length)return;
  savedSpots={};
  persistSaved();
  // Reset all star buttons in list view
  document.querySelectorAll('.save-btn').forEach(b=>{b.classList.remove('saved');b.title='Save';});
  renderSaved();
  toast('All saved spots cleared',2000);
}

// ═══════════════════════════════════════
//  VISITED SPOTS (Step 12)
//  Persisted to localStorage as fs_visited.
//  Visited cards dim and show a checkmark.
//  Toggle in filter bar hides/shows visited spots.
// ═══════════════════════════════════════
function loadVisited(){
  try{visitedSpots=JSON.parse(localStorage.getItem('fs_visited')||'{}');}catch(_){visitedSpots={};}
}
function persistVisited(){
  try{localStorage.setItem('fs_visited',JSON.stringify(visitedSpots));}catch(_){}
}
function isVisited(id){return !!visitedSpots[id];}

function markVisited(id,name){
  visitedSpots[id]={id,name,visitedAt:Date.now()};
  persistVisited();
  toast('✓ Marked as visited: '+name,1800);
  updateVisitButtons(id,true);
  renderList(false);
}
function unmarkVisited(id){
  const name=(visitedSpots[id]||{}).name||'Spot';
  delete visitedSpots[id];
  persistVisited();
  toast('Removed visited: '+name,1800);
  updateVisitButtons(id,false);
  renderList(false);
}
function toggleVisited(id){
  const spot=spots.find(s=>s.id===id);
  const name=spot?spot.name:(visitedSpots[id]||{}).name||'Spot';
  isVisited(id)?unmarkVisited(id):markVisited(id,name);
}
function updateVisitButtons(id,visited){
  document.querySelectorAll('.visit-btn[data-id="'+id+'"]').forEach(b=>{
    b.classList.toggle('visited',visited);
    b.title=visited?'Unmark visited':'Mark visited';
    const icon=b.querySelector('i');
    if(icon)icon.className=visited?'ti ti-circle-check-filled':'ti ti-circle-check';
  });
}
function toggleHideVisited(){
  hideVisited=!hideVisited;
  renderList(false);
}




function showTab(tab){
  const isList=tab==='list';
  const isMap=tab==='map';
  const isSavedTab=tab==='saved';
  document.getElementById('listView').style.display=isList?'block':'none';
  document.getElementById('mapView').classList.toggle('on',isMap);
  document.getElementById('savedView').style.display=isSavedTab?'block':'none';
  document.getElementById('tabList').classList.toggle('on',isList);
  document.getElementById('tabMap').classList.toggle('on',isMap);
  document.getElementById('tabSaved').classList.toggle('on',isSavedTab);
  if(isMap){initMap();setTimeout(()=>leafMap&&leafMap.invalidateSize(),55);}
  if(isSavedTab)renderSaved();
}


</script>
</body>
</html>
