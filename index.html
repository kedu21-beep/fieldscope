<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FieldScope">
<meta name="theme-color" content="#0a140f">
<title>FieldScope</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap');
:root{
  --bg:#0a140f;--card:#13201a;--card2:#1a2a22;
  --border:rgba(92,184,92,.18);--border2:rgba(92,184,92,.35);
  --text:#e8f5e8;--muted:#7a9c7a;--faint:#2a3a2f;
  --accent:#5cb85c;--highlight:#a3e4a3;--lime:#a3e4a3;--green:#5cb85c;--amber:#f4b942;
  --red:#e06c6c;--blue:#4a9eff;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --card-radius:15px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;height:100dvh}

/* ── (All your beautiful CSS from fieldscope-app_1.html) ── */
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
@keyframes scanPulse{0%{border-color:rgba(92,184,92,.4);box-shadow:0 4px 20px rgba(0,0,0,.4)}50%{border-color:rgba(244,185,66,.7);box-shadow:0 4px 28px rgba(244,185,66,.18)}100%{border-color:rgba(92,184,92,.4);box-shadow:0 4px 20px rgba(0,0,0,.4)}}
@keyframes rarePulse{0%,100%{background:rgba(224,108,108,.08)}50%{background:rgba(224,108,108,.15)}}

/* HEADER */
.hdr{padding:calc(var(--safe-t) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,20,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px}
.logo-text{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:#e8ffe8;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:7px}
.gps-badge{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;background:rgba(92,184,92,.07);border:1px solid var(--border);font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:background .15s}
.gdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.gdot.ok{background:var(--accent);animation:glow 2s infinite}
.gdot.err{background:var(--red)}

/* ACTIVITY SELECTOR */
.activity-selector{display:flex;gap:4px;background:rgba(92,184,92,.1);border-radius:9999px;padding:3px;border:1px solid var(--border);margin-left:12px;}
.activity-selector button{padding:5px 14px;border-radius:9999px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:4px;}
.activity-selector button.on{background:var(--accent);color:#13201a;}

/* (The rest of your CSS from fieldscope-app_1.html goes here — I kept it short for this message but you already have it) */
.timer-bar,.log-panel,.scan-wrap,.formula,.tabs,.list,.state,.prog-box,.spot,.saved-card,.expanding,#mapView,.rare-banner,.hero-card,.df-bar,.toast{ /* ... your full CSS ... */ }
</style>
</head>
<body>

<!-- HEADER with Activity Selector -->
<div class="hdr">
  <div class="logo">
    <i class="ti ti-binoculars" style="font-size:24px;color:var(--accent)"></i>
    <div class="logo-text">FieldScope</div>
  </div>
  <div class="activity-selector">
    <button onclick="setActivity('birding')" id="act-birding" class="act-btn on"><i class="ti ti-bird"></i> Birding</button>
    <button onclick="setActivity('hiking')" id="act-hiking" class="act-btn"><i class="ti ti-hiking"></i> Hiking</button>
    <button onclick="setActivity('fishing')" id="act-fishing" class="act-btn"><i class="ti ti-fishing"></i> Fishing</button>
  </div>
  <div class="hdr-right">
    <div class="gps-badge" id="gpsBadge">
      <div class="gdot" id="gdot"></div>
      <span id="gTxt">GPS</span>
    </div>
  </div>
</div>

<!-- TIMER BAR -->
<div class="timer-bar" id="timerBar">
  <div class="t-left">
    <div class="t-clock" id="tClock">0:00</div>
    <div class="t-phase" id="tPhase">scanning</div>
  </div>
  <div class="t-right">
    <div class="log-btn" onclick="toggleLog()">
      <div class="ldot" id="ldot"></div>
      <span>Log</span>
    </div>
  </div>
</div>

<!-- LOG PANEL, SCAN BUTTON, SCORE FORMULA, TABS, LIST, MAP, SAVED, SAFE-PAD, TOAST -->
<!-- (All the rest of the HTML body from your fieldscope-app_1.html goes here exactly as you had it) -->

<div class="safe-pad"></div>
<div class="toast" id="toast"></div>

<!-- MODULAR SCRIPTS -->
<script src="fs-config.js"></script>
<script src="fs-scoring.js"></script>
<script src="fs-scan.js"></script>
<script src="fs-render.js"></script>
<script src="fs-map.js"></script>
<script src="fs-storage.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    initGPS();
    loadSaved();
    loadVisited();
  });
</script>
</body>
</html>
